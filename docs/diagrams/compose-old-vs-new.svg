<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720" font-family="'Comic Sans MS','Comic Neue','Chalkboard SE',cursive">
  <rect width="1040" height="720" fill="#FDFDFD"/>

  <!-- title banner -->
  <rect x="40" y="22" width="960" height="56" rx="10" fill="#A9C0EB"/>
  <text x="520" y="59" text-anchor="middle" font-size="30" font-weight="bold" fill="#1B2A4A">Tethys on Docker Compose — Old vs New</text>

  <!-- column headers -->
  <text x="270" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#C0392B">✗  BEFORE — one fat image</text>
  <text x="775" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#2E8B57">✓  AFTER — modular &amp; non-root</text>

  <!-- divider -->
  <line x1="520" y1="100" x2="520" y2="648" stroke="#D0D0D0" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- ============ BEFORE ============ -->
  <rect x="70" y="138" width="400" height="290" rx="12" fill="#FCE7A2" stroke="#E0B83A" stroke-width="2"/>
  <text x="270" y="162" text-anchor="middle" font-size="16" font-weight="bold" fill="#7A5C00">tethys container · runs as ROOT</text>

  <!-- inner boxes -->
  <g font-size="14" fill="#5b4600" text-anchor="middle">
    <rect x="88"  y="176" width="170" height="40" rx="7" fill="#FBD34D" stroke="#D9A920"/><text x="173" y="201">supervisord</text>
    <rect x="282" y="176" width="170" height="40" rx="7" fill="#FBD34D" stroke="#D9A920"/><text x="367" y="201">saltstack (config)</text>
    <rect x="88"  y="224" width="170" height="40" rx="7" fill="#FBD34D" stroke="#D9A920"/><text x="173" y="249">nginx (proxy)</text>
    <rect x="282" y="224" width="170" height="40" rx="7" fill="#FBD34D" stroke="#D9A920"/><text x="367" y="249">daphne (ASGI)</text>
    <rect x="88"  y="272" width="170" height="40" rx="7" fill="#FBD34D" stroke="#D9A920"/><text x="173" y="297">conda env</text>
    <rect x="282" y="272" width="170" height="40" rx="7" fill="#FBD34D" stroke="#D9A920"/><text x="367" y="297">root user</text>
  </g>
  <rect x="88" y="320" width="364" height="40" rx="7" fill="#F5B7B1" stroke="#C0392B"/>
  <text x="270" y="345" text-anchor="middle" font-size="14" fill="#7B241C">Tethys bootstraps DB + superuser (needs SUPERUSER)</text>
  <rect x="88" y="368" width="364" height="40" rx="7" fill="#F5B7B1" stroke="#C0392B"/>
  <text x="270" y="393" text-anchor="middle" font-size="14" fill="#7B241C">secrets baked into image ENV · static from container</text>

  <!-- plain postgres -->
  <rect x="170" y="452" width="200" height="46" rx="8" fill="#BFD7ED" stroke="#5B8FC0" stroke-width="2"/>
  <text x="270" y="481" text-anchor="middle" font-size="15" fill="#1B3A5B">Postgres (plain container)</text>

  <!-- ============ AFTER ============ -->
  <!-- app tier (green) -->
  <g font-size="13.5" text-anchor="middle">
    <rect x="548" y="150" width="205" height="46" rx="8" fill="#A9DFBF" stroke="#3E9B63" stroke-width="2"/><text x="650" y="172" fill="#14532d">nginx · unprivileged</text><text x="650" y="188" fill="#14532d" font-size="11.5">uid 101 · :8080</text>
    <rect x="775" y="150" width="205" height="46" rx="8" fill="#A9DFBF" stroke="#3E9B63" stroke-width="2"/><text x="877" y="172" fill="#14532d">tethys-web · uvicorn</text><text x="877" y="188" fill="#14532d" font-size="11.5">non-root · uid 1000</text>
    <rect x="548" y="206" width="432" height="44" rx="8" fill="#C8E6D4" stroke="#3E9B63" stroke-width="2"/><text x="764" y="227" fill="#14532d">tethys-init (one-shot): migrate → bootstrap → provision store</text><text x="764" y="243" fill="#14532d" font-size="11">runs direct to primary, then web flips to the pooler</text>
  </g>
  <!-- infra tier (blue) -->
  <g font-size="13.5" text-anchor="middle">
    <rect x="548" y="260" width="135" height="44" rx="8" fill="#BFD7ED" stroke="#5B8FC0" stroke-width="2"/><text x="615" y="287" fill="#1B3A5B">pgbouncer</text>
    <rect x="693" y="260" width="135" height="44" rx="8" fill="#BFD7ED" stroke="#5B8FC0" stroke-width="2"/><text x="760" y="282" fill="#1B3A5B">postgres</text><text x="760" y="297" fill="#1B3A5B" font-size="10.5">owns roles + DB</text>
    <rect x="838" y="260" width="142" height="44" rx="8" fill="#BFD7ED" stroke="#5B8FC0" stroke-width="2"/><text x="909" y="287" fill="#1B3A5B">valkey</text>
  </g>

  <!-- notes panel -->
  <rect x="548" y="318" width="432" height="180" rx="10" fill="#EAF2FB" stroke="#9DBCE0" stroke-width="1.5"/>
  <g font-size="14" fill="#22303f">
    <text x="566" y="344">• secrets → <tspan font-weight="bold">.env</tspan> at runtime (never in the image)</text>
    <text x="566" y="372">• settings → <tspan font-weight="bold">portal_config.yml</tspan> (declarative, mounted)</text>
    <text x="566" y="400">• static → <tspan font-weight="bold">jsDelivr CDN</tspan></text>
    <text x="566" y="428">• runtime → <tspan font-weight="bold">uv venv + uvicorn</tspan></text>
    <text x="566" y="456" font-size="12.5">   (no conda, no daphne, no supervisord, no salt)</text>
    <text x="566" y="484">• every container <tspan font-weight="bold">non-root</tspan>, single-purpose</text>
  </g>

  <!-- caption -->
  <text x="520" y="690" text-anchor="middle" font-size="17" font-weight="bold" fill="#1B2A4A">One fat root container  →  small, non-root, single-purpose services</text>
</svg>

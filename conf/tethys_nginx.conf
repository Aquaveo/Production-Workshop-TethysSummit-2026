map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream tethys_asgi {
    server tethys-web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    location /static/ {
        alias /var/lib/tethys_persist/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/lib/tethys_persist/media/;
    }

    location /workspaces/ {
        alias /var/lib/tethys_persist/workspaces/;
    }

    location / {
        proxy_pass http://tethys_asgi;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Required for ASGI/WebSocket traffic.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_redirect off;

        # Helpful for WebSockets and long-running requests.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
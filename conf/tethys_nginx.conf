map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream tethys_asgi {
    server tethys-web:8000;
}

server {
    listen 8080;          # non-root nginx (nginxinc/nginx-unprivileged) can't bind <1024
    server_name _;

    client_max_body_size 100m;

    # /static/ is served by the jsDelivr CDN (see STATIC_URL in .env /
    # dev/publish-static.sh), so nginx no longer serves static from the
    # volume -- same as the k8s nginx (k8s/base/80-nginx.yaml).

    location /media/ {
        alias /home/tethys/persist/media/;
    }

    location /workspaces/ {
        alias /home/tethys/persist/workspaces/;
    }

    location / {
        proxy_pass http://tethys_asgi;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Required for ASGI/WebSocket traffic.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_redirect off;

        # Helpful for WebSockets and long-running requests.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
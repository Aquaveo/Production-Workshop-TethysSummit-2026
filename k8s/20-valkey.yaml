apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: tethys-k8
spec:
  selector:
    app: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-data
  namespace: tethys-k8
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: tethys-k8
spec:
  replicas: 1
  # The RWO volume can attach to only one pod at a time. Recreate terminates the
  # old pod before starting the new one, so a rollout can't deadlock on the volume
  # (a default RollingUpdate would leave the new pod stuck "Pending" on attach).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          command: ["valkey-server", "--appendonly", "yes", "--dir", "/data"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: valkey-data
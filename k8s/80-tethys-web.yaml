apiVersion: v1
kind: Service
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  selector:
    app: tethys-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tethys-web
  template:
    metadata:
      labels:
        app: tethys-web
    spec:
      containers:
        - name: tethys-web
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/lib/tethys/start-uvicorn.sh"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: tethys-home
              mountPath: /usr/lib/tethys
            - name: tethys-persist
              mountPath: /var/lib/tethys_persist
      volumes:
        - name: tethys-home
          persistentVolumeClaim:
            claimName: tethys-home-pvc
        - name: tethys-persist
          persistentVolumeClaim:
            claimName: tethys-persist-pvc
            

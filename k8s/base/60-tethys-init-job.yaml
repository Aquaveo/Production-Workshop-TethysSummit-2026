apiVersion: batch/v1
kind: Job
metadata:
  name: tethys-init
  namespace: tethys-k8
spec:
  completions: 1
  parallelism: 1          # never >1 - parallel migrate is the race we're avoiding
  backoffLimit: 3         # retries are sequential → still safe
  # Auto-delete the Job 120s after it finishes, so a later `kubectl apply -k` creates a
  # fresh Job instead of failing to patch the (immutable) template of a lingering one.
  # No more manual `kubectl delete job` before re-applying -- unless you re-apply within
  # this window (raise it if you want completed-Job logs to stick around longer).
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      # Run as the image's non-root user. fsGroup makes the `home` emptyDir
      # group-owned by 1000 so the configure step can write portal_config.yml.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # initContainers run sequentially and each must complete before the next,
      # guaranteeing order: configure -> migrate -> (main) createsuperuser.
      initContainers:
        - name: configure
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/portal-config.sh"]   # render portal_config.yml
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            # migrations/DDL must bypass the transaction-mode pooler -> connect direct to the primary
            - name: TETHYS_DB_HOST
              value: "tethys-postgres-rw"
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts:
            - name: home
              mountPath: /home/tethys/portal
            - name: portal-config
              mountPath: /config
              readOnly: true
        - name: db-migrations
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/db-migrations.sh"]   # runs migrations, after configure
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            # migrations/DDL must bypass the transaction-mode pooler -> connect direct to the primary
            - name: TETHYS_DB_HOST
              value: "tethys-postgres-rw"
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts:
            - name: home
              mountPath: /home/tethys/portal
        - name: provision-stores
          image: tethys-workshop:local
          imagePullPolicy: Never
          # Option B persistent store for Dam Inventory, via the least-privilege tethys_app
          # role. Runs after migrations (needs the services/links tables) and DIRECT to the
          # primary (CREATE DATABASE can't traverse the txn-mode pooler). The script verifies
          # the store DB exists and exits non-zero if not, so a failure retries the Job.
          command: ["/usr/local/bin/provision-persistent-store.sh", "dam_inventory", "primary_db"]
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            # portal-side service/link writes go to the portal DB via the rendered
            # portal_config.yml (direct primary, set by the configure step above).
            - name: TETHYS_DB_HOST
              value: "tethys-postgres-rw"
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
            # the persistent-store service connects DIRECT as tethys_app (CREATEDB, non-super)
            - name: TETHYS_APP_DB_HOST
              value: "tethys-postgres-rw"
            - name: TETHYS_APP_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app-store
                  key: username
            - name: TETHYS_APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app-store
                  key: password
          volumeMounts:
            - name: home
              mountPath: /home/tethys/portal
      containers:
        - name: portal-user-bootstrap
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/portal-bootstrap.sh"]   # creates portal superuser, after migrations
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            # migrations/DDL must bypass the transaction-mode pooler -> connect direct to the primary
            - name: TETHYS_DB_HOST
              value: "tethys-postgres-rw"
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts:
            - name: home
              mountPath: /home/tethys/portal

      volumes:
        - name: home
          emptyDir: {}
        - name: portal-config
          configMap:
            name: tethys-portal-config

apiVersion: v1
kind: Secret
metadata:
  name: tethys-db-app
  namespace: tethys-k8
type: kubernetes.io/basic-auth
stringData:
  username: tethys_default
  password: pass
---
apiVersion: v1
kind: Secret
metadata:
  name: tethys-db-super
  namespace: tethys-k8
type: kubernetes.io/basic-auth
stringData:
  username: tethys_super
  password: pass
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tethys-postgres
  namespace: tethys-k8
spec:
  instances: 3          # 1 primary + 2 streaming replicas, automatic failover

  imageName: ghcr.io/cloudnative-pg/postgis:18.3-3.6.2-system-trixie

  bootstrap:
    initdb:
      database: tethys_platform
      owner: tethys_default
      secret:
        name: tethys-db-app

  managed:
    roles:
      - name: tethys_super
        ensure: present
        login: true
        superuser: true
        createdb: true
        passwordSecret:
          name: tethys-db-super

  storage:
    storageClass: local-path
    size: 1Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

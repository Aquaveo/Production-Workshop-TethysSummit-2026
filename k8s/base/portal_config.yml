# Tethys portal configuration - single source of truth for Django/portal settings.
# Kustomize hashes this file into the `tethys-portal-config` ConfigMap; editing it
# and re-applying triggers a zero-downtime rolling update of the web pods (no image rebuild).
#
# SECRET_KEY and DATABASES.default.PASSWORD are intentionally OMITTED - they are
# injected at runtime by scripts/portal-config.sh from Secrets. Never store secrets here.
# DATABASES.default.HOST below is the default (pooler); the init Job overrides it to the
# direct primary (tethys-postgres-rw) via the TETHYS_DB_HOST env var, for migrations.
version: 2.0
name:
apps: {}
settings:
  DEBUG: false
  ALLOWED_HOSTS:
    - localhost
    - 127.0.0.1
    - tethys-web
    - tethys-web.tethys-k8.svc
  CSRF_TRUSTED_ORIGINS:
    - http://localhost:8080
    - http://127.0.0.1:8080
  STATIC_ROOT: /var/lib/tethys_persist/static
  STATIC_URL: https://cdn.jsdelivr.net/gh/Aquaveo/Production-Workshop-TethysSummit-2026@static-2026.06.08-131712
  MEDIA_ROOT: /var/lib/tethys_persist/media
  MEDIA_URL: /media/
  TETHYS_WORKSPACES_ROOT: /var/lib/tethys_persist/workspaces

  # Upload limits - keep aligned with nginx client_max_body_size (CLIENT_MAX_BODY_SIZE).
  # 100 MiB = 100 * 1024 * 1024 = 104857600 bytes (matches nginx "100m").
  # DATA_UPLOAD_MAX_MEMORY_SIZE: the request-body size that triggers a 400 (RequestDataTooBig)
  #   for non-file form data -> this is the one that "rejects"; raise it to match nginx.
  # FILE_UPLOAD_MAX_MEMORY_SIZE: memory-vs-disk threshold (files larger than this stream to a
  #   temp file). NOT a hard limit; lower it to save RAM, larger files just spill to disk.
  DATA_UPLOAD_MAX_MEMORY_SIZE: 104857600
  FILE_UPLOAD_MAX_MEMORY_SIZE: 104857600
  DATABASES:
    default:
      ENGINE: django.db.backends.postgresql
      NAME: tethys_platform
      USER: tethys_default
      HOST: tethys-postgres-pooler-rw
      PORT: 5432
      DISABLE_SERVER_SIDE_CURSORS: true
      CONN_MAX_AGE: 0
  CHANNEL_LAYERS:
    default:
      BACKEND: channels_redis.core.RedisChannelLayer
      CONFIG:
        hosts:
          - - redis://valkey:6379/0
  TETHYS_PORTAL_CONFIG:
    ENABLE_OPEN_PORTAL: true
    BYPASS_TETHYS_HOME_PAGE: true

# Site / branding content. Applied to the DB by `tethys site -f` in the init Job
# (portal-bootstrap.sh). Fill in values here; empty entries are skipped. Keys are
# snake_case and map to Tethys site settings (e.g. site_title -> "Site Title").
site_settings:
  GENERAL_SETTINGS:
    site_title:
    favicon:
    brand_text:
    brand_image:
    brand_image_height:
    brand_image_width:
    brand_image_padding:
    apps_library_title:
    primary_color:
    secondary_color:
    primary_text_color:
    primary_text_hover_color:
    secondary_text_color:
    secondary_text_hover_color:
    background_color:
    footer_copyright:        # was COPYRIGHT
  HOME_PAGE:
    hero_text:
    blurb_text:
    feature_1_heading:
    feature_1_body:
    feature_1_image:
    feature_2_heading:
    feature_2_body:
    feature_2_image:
    feature_3_heading:
    feature_3_body:
    feature_3_image:
    call_to_action:
    call_to_action_button:
  CUSTOM_STYLES:
    portal_base_css:
    home_page_css:
    apps_library_css:
    accounts_base_css:
    login_css:
    register_css:
    user_base_css:
  CUSTOM_TEMPLATES:
    home_page_template:
    apps_library_template:
    login_page_template:
    register_page_template:
    user_page_template:
    user_settings_page_template:

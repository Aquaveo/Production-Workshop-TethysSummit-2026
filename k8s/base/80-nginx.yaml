apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: tethys-k8
data:
  # Rendered by the nginx image's entrypoint (envsubst) into /etc/nginx/conf.d/default.conf.
  # Only ${CLIENT_MAX_BODY_SIZE} is substituted (it's the only var we define in the env);
  # nginx's own $host/$remote_addr/$http_upgrade etc. are left untouched.
  default.conf.template: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream tethys_asgi {
        server tethys-web:${TETHYS_PORT};
    }

    server {
        listen 8080;          # non-root nginx can't bind <1024
        server_name _;

        client_max_body_size ${CLIENT_MAX_BODY_SIZE};

        # /static/ is served by jsDelivr (see STATIC_URL in tethys-config / publish-static.sh),
        # so nginx no longer serves static from the PVC.

        location /media/ {
            alias /home/tethys/persist/media/;
        }

        location /workspaces/ {
            alias /home/tethys/persist/workspaces/;
        }

        location / {
            proxy_pass http://tethys_asgi;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_redirect off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: tethys-k8
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80              # Service port (HTTPRoute backendRef targets this) stays 80
      targetPort: 8080      # ...but the unprivileged nginx container listens on 8080
      nodePort: 30080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: tethys-k8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # Unprivileged nginx already runs as uid 101; pin it + drop root explicitly.
      # fsGroup 1000 matches the tethys-persist PVC owner so nginx can read media/workspaces.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:stable-alpine
          ports:
            - containerPort: 8080
          env:
            # The only var envsubst substitutes into the template. Sourced from the
            # hashed tethys-config CM, so changing it auto-rolls nginx.
            - name: CLIENT_MAX_BODY_SIZE
              valueFrom:
                configMapKeyRef:
                  name: tethys-config
                  key: CLIENT_MAX_BODY_SIZE
            - name: TETHYS_PORT
              valueFrom:
                configMapKeyRef:
                  name: tethys-config
                  key: TETHYS_PORT
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
            - name: tethys-persist
              mountPath: /home/tethys/persist
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: tethys-persist
          persistentVolumeClaim:
            claimName: tethys-persist-pvc
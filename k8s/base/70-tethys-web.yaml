apiVersion: v1
kind: Service
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  selector:
    app: tethys-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: tethys-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0     # never go below 2 ready
      maxSurge: 1           # bring up a new one before retiring an old one
  selector:
    matchLabels:
      app: tethys-web
  template:
    metadata:
      labels:
        app: tethys-web
    spec:
      initContainers:
        - name: configure          # per-pod portal_config.yml → emptyDir
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/portal-config.sh"]
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts:
            - name: home
              mountPath: /usr/lib/tethys
            - name: portal-config
              mountPath: /config
              readOnly: true
        - name: wait-for-schema    # gate on the Job's migrate, don't run migrate
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/bin/bash","-c"]
          args:
            - |
              until tethys manage migrate --check >/dev/null 2>&1; do
                echo "waiting for migrations..."; sleep 3
              done
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts: [{ name: home, mountPath: /usr/lib/tethys }]
      containers:
        - name: tethys-web
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/start-uvicorn.sh"]
          ports:
            - name: http
              containerPort: 8000   # set from TETHYS_PORT via kustomize replacements
          env:
            # uvicorn binds to $PORT (start-uvicorn.sh). Single source: TETHYS_PORT.
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: tethys-config
                  key: TETHYS_PORT
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          # HTTP readiness: keeps an "up but erroring" pod out of the Service.
          # Host header must be in ALLOWED_HOSTS or Django returns 400 DisallowedHost.
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          # Liveness stays tcpSocket on purpose: an HTTP/DB-dependent liveness check
          # would restart every pod during a DB/pooler outage (restart storm).
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: home
              mountPath: /usr/lib/tethys
            - name: tethys-persist
              mountPath: /var/lib/tethys_persist
      volumes:
        - name: tethys-persist
          persistentVolumeClaim:
            claimName: tethys-persist-pvc
        - name: home
          emptyDir: {}             # per-pod is correct - config regenerated from env
        - name: portal-config
          configMap:
            name: tethys-portal-config
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tethys-web
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
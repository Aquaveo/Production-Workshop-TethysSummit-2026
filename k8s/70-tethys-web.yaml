apiVersion: v1
kind: Service
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  selector:
    app: tethys-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tethys-web
  namespace: tethys-k8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tethys-web
  template:
    metadata:
      labels:
        app: tethys-web
    spec:
      initContainers:
        - name: configure          # per-pod portal_config.yml → emptyDir
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/configure-portal.sh"]
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts: [{ name: home, mountPath: /usr/lib/tethys }]
        - name: wait-for-schema    # gate on the Job's migrate, don't run migrate
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/bin/bash","-c"]
          args:
            - |
              until tethys manage migrate --check >/dev/null 2>&1; do
                echo "waiting for migrations..."; sleep 3
              done
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          env:
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          volumeMounts: [{ name: home, mountPath: /usr/lib/tethys }]
      containers:
        - name: tethys-web
          image: tethys-workshop:local
          imagePullPolicy: Never
          command: ["/usr/local/bin/start-uvicorn.sh"]
          ports:
            - containerPort: 8000
          env:
            - name: TETHYS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tethys-db-app
                  key: password
          envFrom:
            - configMapRef:
                name: tethys-config
            - secretRef:
                name: tethys-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: home
              mountPath: /usr/lib/tethys
            - name: tethys-persist
              mountPath: /var/lib/tethys_persist
      volumes:
        - name: tethys-persist
          persistentVolumeClaim:
            claimName: tethys-persist-pvc
        - name: home
          emptyDir: {}             # per-pod is correct - config regenerated from env
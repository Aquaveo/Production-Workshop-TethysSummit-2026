apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: tethys-k8
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream tethys_asgi {
        server tethys-web:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100m;

        location /static/ {
            alias /var/lib/tethys_persist/static/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /media/ {
            alias /var/lib/tethys_persist/media/;
        }

        location /workspaces/ {
            alias /var/lib/tethys_persist/workspaces/;
        }

        location / {
            proxy_pass http://tethys_asgi;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_redirect off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: tethys-k8
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: tethys-k8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: tethys-persist
              mountPath: /var/lib/tethys_persist
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: tethys-persist
          persistentVolumeClaim:
            claimName: tethys-persist-pvc
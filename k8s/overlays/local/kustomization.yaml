apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tethys-k8
resources:
  - ../../base
images:
  - name: tethys-workshop
    newTag: local
# Patch env-specific bits without copying the whole Deployment:
patches:
  - target: { kind: Deployment, name: tethys-web }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
# Override just a FEW config keys per environment; base keeps the other ~85.
configMapGenerator:
  - name: tethys-config       # must match the base generator name
    behavior: merge           # merge into base's, don't replace
    literals:
      - DEBUG=True
      - ALLOWED_HOSTS=['localhost', '127.0.0.1']
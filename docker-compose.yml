services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tethys-postgres
    environment:
      POSTGRES_DB: ${TETHYS_DB_NAME:-tethys_platform}
      POSTGRES_USER: ${TETHYS_DB_USERNAME:-tethys}
      POSTGRES_PASSWORD: ${TETHYS_DB_PASSWORD:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TETHYS_DB_USERNAME:-tethys} -d ${TETHYS_DB_NAME:-tethys_platform}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tethys-redis
    restart: unless-stopped

  tethys-init:
    build:
      context: .
    container_name: tethys-init
    env_file:
      - .env
    command: ["/usr/lib/tethys/run.sh"]
    volumes:
      - tethys_home:/var/lib/tethys
      - tethys_static:/var/www/tethys/static
      - tethys_media:/var/www/tethys/media
      - tethys_workspaces:/var/www/tethys/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  tethys-web:
    build:
      context: .
    command: ["/usr/lib/tethys/start-uvicorn.sh"]
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - tethys_home:/var/lib/tethys
      - tethys_static:/var/www/tethys/static
      - tethys_media:/var/www/tethys/media
      - tethys_workspaces:/var/www/tethys/workspaces
    depends_on:
      tethys-init:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: tethys-nginx
    ports:
      - "8080:80"
    volumes:
      - ./conf/tethys_nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - tethys_static:/var/www/tethys/static:ro
      - tethys_media:/var/www/tethys/media:ro
      - tethys_workspaces:/var/www/tethys/workspaces:ro
    depends_on:
      tethys-web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  tethys_home:
  tethys_static:
  tethys_media:
  tethys_workspaces:
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tethys-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TETHYS_DB_USERNAME:-tethys} -d ${TETHYS_DB_NAME:-tethys_platform}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: tethys-valkey
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tethys-init:
    build:
      context: .
    container_name: tethys-init
    env_file:
      - .env
    command: ["/usr/local/bin/init-tethys.sh"]
    volumes:
      - tethys_home:/usr/lib/tethys
      - tethys_persist:/var/lib/tethys_persist
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: "no"

  tethys-web:
    build:
      context: .
    command: ["/usr/local/bin/start-uvicorn.sh"]
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - tethys_home:/usr/lib/tethys
      - tethys_persist:/var/lib/tethys_persist
    depends_on:
      tethys-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: tethys-nginx
    ports:
      - "8080:80"
    volumes:
      - ./conf/tethys_nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - tethys_persist:/var/lib/tethys_persist:ro
    depends_on:
      tethys-web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  tethys_home:
  tethys_persist:
  valkey_data: